name: verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Verify shipped checksums
        run: sha256sum -c checksums.sha256
      - name: Run the reproduction suite
        run: python3 reproduce.py
      - name: Verify decisive raw logs
        run: python3 scripts/verify_decisive_logs.py
